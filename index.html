    <style>
        /* [공통 설정] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; color: #333; text-align: center; }
        img { width: 100%; height: auto; display: block; vertical-align: middle; }

        /* [1. 인트로 팝업] */
        .intro-popup-container { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: rgba(0, 0, 0, 0.75); z-index: 10000; align-items: center; justify-content: center; padding: 15px;

        .intro-popup-content { 
            position: relative; width: 95%; max-width: 450px; 
            animation: fadeInScale 0.6s ease-out forwards; transform-origin: center center; opacity: 0;

        @keyframes fadeInScale {
            0% { transform: translateY(-20px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .intro-popup-content img { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .pop-close-x { 
            position: absolute; top: 15px; right: 15px; width: 30px; height: 30px; 
            cursor: pointer; z-index: 2; background: rgba(0,0,0,0.5); border-radius: 50%; color: #fff; line-height: 30px; font-weight: bold; font-style: normal;
        }

        /* [2. 명함 & 예약 폼 섹션] */
        .business-card, .reservation-card { width: 100%; background: #fff; padding: 30px 20px; border-bottom: 1px solid #eee; }

        .card-container img { border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .card-btn-call { display: block; margin-top: 15px; padding: 12px 0; background: #003a78; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; }

        /* [우측 상담 예약 박스 - 파란색 테마 적용] */
        .res-container { 
            border: 2px solid #ffcc00; /* 테두리는 골드로 포인트 */
            border-radius: 20px; 
            padding: 25px 20px; 
            background: linear-gradient(135deg, #002a58, #003a78); /* 배경을 진한 파란색 그라데이션으로 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            color: #fff; /* 내부 글씨는 모두 하얗게 */
        }
        
        .res-container h3 { 
            font-size: 20px; 
            color: #ffcc00; /* 제목은 골드색으로 강조 */
            margin-bottom: 18px; 
            font-weight: 700; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .res-input { 
            width: 100%;

            border: 1px solid rgba(255,255,255,0.3); /* 입력창 테두리는 살짝 투명하게 */
            border-radius: 10px; 
            font-size: 15px; 
            background: rgba(255,255,255,0.9); /* 입력창 배경은 살짝 밝게 해서 가독성 확보 */
            color: #333;
        }
        
        .res-btn { 
            width: 100%; 
            padding: 15px; 
            background: #ffcc00; /* 버튼은 눈에 확 띄는 노란색/골드계열 */
            color: #002a58; /* 버튼 글자는 진한 파란색 */

            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .res-btn:hover {
            transform: scale(1.02); /* 마우스 올리면 살짝 커지는 효과 */
        }

        /* [3. 타이틀 & 배너] */

        .point-banner {

        @keyframes bannerPulse { 0% { background-color: #002a58; } 50% { background-color: #004da1; } 100% { background-color: #002a58; } }

        /* [4. 탭 메뉴] */
        .tab-menu { display: flex; flex-wrap: wrap; justify-content: center; background: #fff; position: sticky; top: 0; z-index: 2000; border-bottom: 2px solid #003a78; }
        .tab-btn { flex: 1; min-width: 20%; padding: 15px 5px; border: none; background: #fff; font-size: 16px; font-weight: bold; color: #666; cursor: pointer; border-right: 1px solid #eee; }
        .tab-btn.active { background: #003a78; color: #fff; }

        .tab-content { display: none; width: 100%; max-width: 1100px; margin: 0 auto; background: #fff; }
        .tab-content.active { display: block !important; }

        /* [5. 탭 콘텐츠 & 세대안내 복합 필터] */
        .tab-content { display: none; width: 100%; max-width: 1100px; margin: 0 auto; background: #fff; }
        .tab-content.active { display: block !important; }
        .view-mode-selector { display: flex; background: #eee; margin: 0; padding: 10px; position: sticky; top: 52px; z-index: 1500; border-bottom: 1px solid #ddd; }
        .mode-btn { flex: 1; padding: 12px; border: none; background: #ddd; font-weight: bold; color: #888; cursor: pointer; border-radius: 6px; margin: 0 5px; }
        .mode-btn.active { background: #003a78; color: #fff; }
        .mode-content, .sub-tab-content { display: none; }
        .mode-content.active, .sub-tab-content.active { display: block !important; }
        .size-filter, .type-group.active { position: sticky; top: 120px; z-index: 1000; background: #fff; border-bottom: 1px solid #eee; transition: all 0.3s ease; }
        .size-filter.scrolled, .type-group.active.scrolled { background: transparent !important; border-bottom: none !important; }
        .size-filter { display: flex; justify-content: center; gap: 8px; padding: 15px 10px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn, .sub-tab-btn { flex: 0 0 auto; min-width: 95px; padding: 10px 15px; border: 1px solid #003a78; background: #fff; color: #003a78; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .filter-btn.active, .sub-tab-btn.active { background: #003a78 !important; color: #fff !important; }
        .type-group { display: none; padding: 15px 10px; text-align: center; }
        #photo-view .type-group.active { display: block !important; }
        .sub-tab-menu { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        /* [6. PC 전용 설정] */
        @media (min-width: 1024px) {

            .business-card { left: 40px; transform: translateY(-50%); }

            .business-card.scrolled, .reservation-card.scrolled { top: 50% !important; }
            
            .main-title .inner-logo { display: block; position: absolute; left: 115px; top: 50%; transform: translateY(-50%); height: 160px; z-index: 1; }
            .main-title .inner-logo img { height: 100%; width: auto; }
            .main-title h2 { font-size: 42px; }
            .main-title p { font-size: 20px; }
            
            .mobile-res-only { display: none; } /* PC에선 탭 아래 예약창 숨김 */
        }

        /* [7. 모바일 전용 설정] */
        @media (max-width: 1023px) {
            .reservation-card { position: static; border: none; border-top: 8px solid #f1f1f1; padding: 50px 20px; background: #f8f9fa; }
            #resCard { display: none; } /* PC 전용 고정창은 모바일서 숨김 */
        }
    </style>
</head>

            <script>
                window.addEventListener('DOMContentLoaded', function() {
                    const pop = document.getElementById('introPopup');
                    pop.style.display = 'flex';
                    document.getElementById('popClose').onclick = () => { pop.style.display = 'none'; };
                    pop.onclick = (e) => { if(e.target === pop) pop.style.display = 'none'; };
        
                    window.addEventListener('scroll', function() {
                        let s = window.pageYOffset || document.documentElement.scrollTop;
                        const pcCard = document.getElementById('pcCard');
                        const resCard = document.getElementById('resCard');
        
                        if (window.innerWidth >= 1024) {
                            if (s > 100) {
                                pcCard?.classList.add('scrolled');
                                resCard?.classList.add('scrolled');
                            } else {
                                pcCard?.classList.remove('scrolled');
                                resCard?.classList.remove('scrolled');
                            }
                        }
        
                        document.querySelectorAll('.size-filter, .type-group.active').forEach(el => {
                                if (s > 400) el.classList.add('scrolled');
                                else el.classList.remove('scrolled');
                            });
                        
                    });
                });


                
        function sendReservation(nameId, phoneId) {
            const name = document.getElementById(nameId).value;
            let rawPhone = document.getElementById(phoneId).value;
        
            // 1. 숫자만 골라내기
            let phone = rawPhone.replace(/[^0-9]/g, "");
        
            if (!name || !phone) {
                alert("성함과 연락처를 모두 입력해주세요.");
                return;
            }
        
            // 2. 숫자만 있는 번호를 '010-0000-0000' 형식으로 변환합니다.
        let formattedPhone = "";
        if (phone.length === 11) {
            // (010)(2481)(6333) -> 010-2481-6333
            formattedPhone = phone.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
        } else if (phone.length === 10) {
            // (010)(248)(1632) -> 010-248-1632
            formattedPhone = phone.replace(/(010|011|016|017|018|019)(\d{3})(\d{4})/, '$1-$2-$3');
        } else {
            formattedPhone = phone; 
        }
        
            // 3. 메시지 구성 및 모바일/PC 분기 처리
            const message = `안녕하세요. ${name}입니다.\n${formattedPhone}로 전화 상담 신청합니다.`;
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);
            
            // 이 주소를 한 번만 정의합니다.
            const smsLink = `sms:${TEAM_LEADER_PHONE}${isIOS ? '&' : '?'}body=${encodeURIComponent(message)}`;        
            if (isIOS || isAndroid) {
                // 모바일은 문자 앱 실행
                window.location.href = smsLink;
            } else {
                // PC는 안내 창만 띄우기 (여기서 멈춤)
                const formatted = TEAM_LEADER_PHONE.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
            alert(`PC에서는 문자 전송이 지원되지 않을 수 있습니다.\n\n[상담 예약 접수 안내]\n${TEAM_LEADER_NAME} 팀장 번호: ${formatted}\n\n위 번호로 문자를 보내주시면 바로 연락드리겠습니다! ✨`);            }
        }

        function openTab(e, t) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(t).classList.add("active");
            e.currentTarget.classList.add("active");
            if(t === 'tab3') changeViewMode(null, 'photo-view');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function changeViewMode(e, m) {
            document.querySelectorAll('.mode-content, .mode-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(m).classList.add('active');
            if(e) {
                e.currentTarget.classList.add('active');
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
            else document.querySelector('.mode-btn').classList.add('active');
            
            if(m === 'photo-view') document.querySelector('#photo-view .sub-tab-btn').click();
            else document.querySelector('.filter-btn').click();
        }

        function filterSize(e, s) {
            document.querySelectorAll('#plan-view .type-group, .filter-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            e.currentTarget.classList.add('active');
            document.getElementById(s).querySelector('.sub-tab-btn').click();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function openSubTab(e, s, p) {
            const parent = document.getElementById(p);
            parent.querySelectorAll(".sub-tab-content, .sub-tab-btn").forEach(x => x.classList.remove("active"));
            document.getElementById(s).classList.add("active");
            e.currentTarget.classList.add("active");
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

                
        window.addEventListener('DOMContentLoaded', function() {
            const name = TEAM_LEADER_NAME;
            const phone = TEAM_LEADER_PHONE;
            const formatted = phone.replace(/(010|011|016|017|018|019)(\d{3,4})(\d{4})/, '$1-$2-$3');
        
            // 1. 모든 이름을 한꺼번에 교체
            document.querySelectorAll('.set-name').forEach(el => el.innerText = name);
        
            // 2. 모든 전화번호 텍스트를 한꺼번에 교체
            document.querySelectorAll('.set-phone-text').forEach(el => el.innerText = formatted);
        
            // 3. 모든 전화걸기 링크를 한꺼번에 교체
            document.querySelectorAll('.set-phone-link').forEach(el => el.href = "tel:" + phone);
            
            // 4. "장지원 팀장" 같이 뒤에 글자가 붙는 경우
            document.querySelectorAll('.set-name-title').forEach(el => el.innerText = name + " 팀장 상담 예약");

            // [핵심 코드] 브라우저 탭 제목을 동적으로 변경
            document.title = "더샵 오산역아크시티 - " + name + " 팀장";
        });
                
    </script>
</body>
</html>
